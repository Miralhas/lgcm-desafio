services:
  influxdb:
    container_name: lgcm-influxdb
    image: influxdb:1.8.10
    networks:
      - k6
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
    volumes:
    - influxdb_data:/var/lib/influxdb

  grafana:
    container_name: lgcm-grafana
    image: grafana/grafana:10.2.2
    networks:
      - k6
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_logs:/var/log/grafana

  k6:
    container_name: lgcm-k6 
    image: grafana/k6:latest
    networks:
      - k6
      - lgcm-network
    ports:
      - "6565:6565"
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
    volumes:
      - ./scripts:/scripts

volumes:
  influxdb_data:
  grafana_data:
  grafana_logs:
networks:
  k6:
    name: k6
  lgcm-network:
    name: lgcm-network
    external: true